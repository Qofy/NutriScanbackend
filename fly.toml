# fly.toml app configuration file
app = "nutriscan-api"
primary_region = "iad"

[build]
  builder = "paas"
  buildpacks = ["python"]

[env]
  PORT = "8080"

[[services]]
  protocol = "tcp"
  internal_port = 8080
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.http_checks]
    enabled = true
    uri = "/health/"
    interval = 30000
    timeout = 5000

[processes]
  app = "gunicorn nutriscan.wsgi:application --bind 0.0.0.0:8080 --workers 2"

[[mounts]]
  source = "data"
  destination = "/app/data"
  size_gb = 1
